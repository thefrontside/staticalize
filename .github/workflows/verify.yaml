name: Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.9.1

      - name: check formatting
        run: deno fmt --check

      - name: lint
        run: deno lint

      - name: type check
        run: deno check mod.ts main.ts

      - name: run tests
        run: deno test -A
